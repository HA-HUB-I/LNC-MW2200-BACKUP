<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <link rel="manifest" href="/manifest.json" />
  <title>LNC Machine</title>
  <style>
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2a2d3e; --text: #e2e8f0;
      --muted: #94a3b8; --accent: #38bdf8; --green: #22c55e; --orange: #f97316; --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; line-height: 1.4; }
    
    header { background: var(--card); padding: 1rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    
    .modes-row { display: flex; gap: 0.4rem; overflow-x: auto; margin-top: 0.75rem; padding-bottom: 0.2rem; }
    .mode-tag { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.6rem; font-weight: 800; background: #232936; color: var(--muted); border: 1px solid var(--border); }
    .mode-tag.active { background: rgba(56, 189, 248, 0.2); color: var(--accent); border-color: var(--accent); }

    #warning-bar { display: none; flex-direction: column; gap: 0.4rem; padding: 1rem 1rem 0 1rem; }
    .warning-item { padding: 0.5rem; border-radius: 6px; font-weight: 800; font-size: 0.75rem; text-align: center; }
    .warning-item.red { background: rgba(239, 68, 68, 0.2); color: var(--red); border: 1px solid var(--red); }
    .warning-item.orange { background: rgba(249, 115, 22, 0.2); color: var(--orange); border: 1px solid var(--orange); }

    .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; padding: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
    .card h2 { font-size: 0.7rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; }

    .unit-toggle { background: var(--bg); border: 1px solid var(--border); color: var(--accent); padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 800; font-size: 0.7rem; cursor: pointer; }

    .axis-row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0.75rem; background: rgba(0,0,0,0.2); border-radius: 6px; margin-bottom: 0.3rem; }
    .axis-label { font-size: 1rem; font-weight: 900; color: var(--accent); }
    .axis-val { font-size: 1.4rem; font-weight: 700; font-family: monospace; }
    .axis-abs { font-size: 0.6rem; color: var(--muted); text-align: right; margin-top: -2px; margin-bottom: 5px; padding-right: 0.5rem; }

    .state-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.3rem; }
    .state-item { padding: 0.4rem 0.1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-size: 0.55rem; font-weight: 800; text-align: center; color: var(--muted); }
    .state-item.active { background: rgba(34, 197, 94, 0.2); color: var(--green); border-color: var(--green); }
    .state-item.active-red { background: rgba(239, 68, 68, 0.2); color: var(--red); border-color: var(--red); }

    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .btn { padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); background: #232936; color: white; font-weight: 700; font-size: 0.75rem; cursor: pointer; }
    .btn.green { border-color: var(--green); color: var(--green); }
    .btn.red { border-color: var(--red); color: var(--red); }
    .btn.full { grid-column: span 2; }

    .gauge-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-top: 4px; }
    .gauge-fill { height: 100%; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1 style="font-size: 1rem;">LNC MW2200A</h1>
    <div id="conn-status" style="font-size: 0.6rem; font-weight: 800; color: var(--green);">● ОНЛАЙН</div>
  </div>
  <div class="modes-row">
    <span class="mode-tag" id="m-MEM">AUTO</span>
    <span class="mode-tag" id="m-MDI">MDI</span>
    <span class="mode-tag" id="m-JOG">JOG</span>
    <span class="mode-tag" id="m-INCJOG">STEP</span>
    <span class="mode-tag" id="m-MPG">HANDEL</span>
    <span class="mode-tag" id="m-ZRN">HOME</span>
  </div>
</header>

<div id="warning-bar"></div>

<main class="container">
  
  <div class="card">
    <h2>ПОЗИЦИЯ <button class="unit-toggle" onclick="toggleUnits()" id="unit-btn">MM</button></h2>
    <div class="axis-row"><span class="axis-label">X</span><span class="axis-val" id="val-x">0.000</span></div>
    <div class="axis-abs" id="val-abs-x">Abs: 0.000</div>
    <div class="axis-row"><span class="axis-label">Y</span><span class="axis-val" id="val-y">0.000</span></div>
    <div class="axis-abs" id="val-abs-y">Abs: 0.000</div>
    <div class="axis-row"><span class="axis-label">Z</span><span class="axis-val" id="val-z">0.000</span></div>
    <div class="axis-abs" id="val-abs-z">Abs: 0.000</div>
  </div>

  <div class="card">
    <h2>СТАТУС</h2>
    <div class="state-grid">
      <div class="state-item" id="fl-cycle">CYCLE</div>
      <div class="state-item" id="fl-spindle">SPINDLE</div>
      <div class="state-item" id="fl-hold">HOLD</div>
      <div class="state-item" id="fl-alarm">ALARM</div>
      <div class="state-item" id="fl-estop">E-STOP</div>
      <div class="state-item" id="fl-vacuum">VACUUM</div>
      <div class="state-item" id="fl-fwd">FORWARD</div>
      <div class="state-item" id="fl-left">LEFT</div>
      <div class="state-item" id="fl-right">RIGHT</div>
    </div>
    <div style="margin-top: 0.75rem; padding-top: 0.5rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.7rem;">
      <span>ЦИКЪЛ: <b id="val-cycle" style="color:var(--accent)">00:00:00</b></span>
      <span>ОБЩО: <b id="val-total">00:00:00</b></span>
    </div>
  </div>

  <div class="card">
    <h2>СКОРОСТ</h2>
    <div style="margin-bottom: 0.5rem;">
      <div style="display:flex; justify-content:space-between; font-size:0.7rem;"><span>Шпиндел</span><span><b id="val-spindle">0</b> RPM</span></div>
      <div class="gauge-bar"><div id="bar-spindle" class="gauge-fill" style="background:var(--orange)"></div></div>
    </div>
    <div>
      <div style="display:flex; justify-content:space-between; font-size:0.7rem;"><span>Подаване</span><span><b id="val-feed">0</b> mm/m</span></div>
      <div class="gauge-bar"><div id="bar-feed" class="gauge-fill" style="background:var(--green)"></div></div>
    </div>
  </div>

  <div class="card">
    <h2>УПРАВЛЕНИЕ</h2>
    <div class="btn-grid">
      <button class="btn green" onclick="sendCommand('cycle_start')">START</button>
      <button class="btn" onclick="sendCommand('feed_hold')">HOLD</button>
      <button class="btn" onclick="sendCommand('reset')">RESET</button>
      <button class="btn red" onclick="if(confirm('STOP?'))sendCommand('estop')">STOP</button>
      <button class="btn green full" onclick="sendMcode('vacuum_on')">VACUUM ON</button>
      <button class="btn red full" onclick="sendMcode('vacuum_off')">VACUUM OFF</button>
    </div>
  </div>

</main>

<script>
  let currentUnit = 'mm';
  function toggleUnits() {
    currentUnit = currentUnit === 'mm' ? 'cm' : 'mm';
    document.getElementById('unit-btn').textContent = currentUnit.toUpperCase();
    updateUI(); 
  }

  let lastData = null;

  function formatPos(val) {
    if (currentUnit === 'cm') return (val / 10).toFixed(4);
    return val.toFixed(3);
  }

  function fmtTime(s) {
    if(!s) return "00:00:00";
    const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60);
    return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  }

  function updateUI() {
    if (!lastData) return;
    const d = lastData;
    
    document.getElementById('val-x').textContent = formatPos(d.x_pos);
    document.getElementById('val-y').textContent = formatPos(d.y_pos);
    document.getElementById('val-z').textContent = formatPos(d.z_pos);
    document.getElementById('val-abs-x').textContent = "Abs: " + formatPos(d.abs_x_pos);
    document.getElementById('val-abs-y').textContent = "Abs: " + formatPos(d.abs_y_pos);
    document.getElementById('val-abs-z').textContent = "Abs: " + formatPos(d.abs_z_pos);
    
    document.getElementById('val-spindle').textContent = d.spindle_rpm;
    document.getElementById('bar-spindle').style.width = Math.min(100, (d.spindle_rpm/24000)*100) + "%";
    document.getElementById('val-feed').textContent = d.feed_rate;
    document.getElementById('bar-feed').style.width = Math.min(100, (d.feed_rate/10000)*100) + "%";

    const setFl = (id, act, cls='active') => {
      const el = document.getElementById(id);
      if(el) act ? el.classList.add(cls) : el.classList.remove(cls);
    };
    setFl('fl-cycle', d.cycle_running);
    setFl('fl-spindle', d.spindle_on);
    setFl('fl-alarm', d.alarm_active, 'active-red');
    setFl('fl-estop', d.estop_active, 'active-red');
    setFl('fl-vacuum', d.vacuum_on);
    setFl('fl-fwd', d.forward_pos_on);
    setFl('fl-left', d.left_pos_on);
    setFl('fl-right', d.right_pos_on);

    const MODES = ['MEM','MDI','JOG','INCJOG','MPG','ZRN'];
    MODES.forEach(m => document.getElementById('m-'+m).className = 'mode-tag' + (d.cnc_mode===m?' active':''));

    document.getElementById('val-cycle').textContent = fmtTime(d.current_cycle_time_s);
    document.getElementById('val-total').textContent = fmtTime(d.total_cycle_time_s);

    const wb = document.getElementById('warning-bar');
    let w = [];
    if(d.spindle_on) w.push('<div class="warning-item orange">ШПИНДЕЛЪТ РАБОТИ!</div>');
    if(d.forward_pos_on || d.left_pos_on || d.right_pos_on) w.push('<div class="warning-item red">СТОПЕРИТЕ СА АКТИВНИ!</div>');
    if(w.length){ wb.style.display='flex'; wb.innerHTML=w.join(''); } else { wb.style.display='none'; }
  }

  async function fetchStatus() {
    try {
      const r = await fetch('/api/status');
      lastData = await r.json();
      updateUI();
      document.getElementById('conn-status').textContent = '● ОНЛАЙН';
      document.getElementById('conn-status').style.color = 'var(--green)';
    } catch(e) {
      document.getElementById('conn-status').textContent = '● ОФЛАЙН';
      document.getElementById('conn-status').style.color = 'var(--red)';
    }
  }

  async function sendCommand(cmd) { fetch('/api/command', {method:'POST', body:JSON.stringify({command:cmd})}); }
  async function sendMcode(m) { fetch('/api/mcode', {method:'POST', body:JSON.stringify({mcode:m})}); }

  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }
  setInterval(fetchStatus, 500);
</script>
</body>
</html>
